<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chitchat Clone - Realtime Global Room</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Importing a free, scaled real-time system library (PieSocket Example) -->
    <script src="https://unpkg.com/piesocket-js@2"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col justify-between">

    <!-- Header Navigation -->
    <header class="bg-gray-800 border-b border-gray-700 p-4 sticky top-0 flex justify-between items-center shadow-md">
        <h1 class="text-xl font-black tracking-wider text-emerald-400">CHITCHAT</h1>
        <div id="connection-badge" class="text-xs bg-red-950 text-red-400 px-3 py-1 rounded-full font-semibold border border-red-800">
            Disconnected
        </div>
    </header>

    <!-- Chat Message Container Window -->
    <main id="chat-window" class="flex-1 max-w-4xl w-full mx-auto p-4 space-y-3 overflow-y-auto max-h-[calc(100vh-140px)]">
        <div class="bg-gray-800 p-3 rounded-lg text-sm border border-gray-700 max-w-xs text-gray-400">
            Welcome to the global room. Type a message below to broadcast instantly...
        </div>
    </main>

    <!-- Bottom Text Input Panel -->
    <footer class="bg-gray-800 border-t border-gray-700 p-4 sticky bottom-0">
        <form id="chat-form" class="max-w-4xl mx-auto flex gap-3">
            <input 
                id="message-input"
                type="text" 
                placeholder="Type your message..." 
                autocomplete="off"
                required
                class="flex-1 bg-gray-950 border border-gray-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-emerald-500 text-white"
            >
            <button 
                type="submit" 
                class="bg-emerald-500 hover:bg-emerald-600 text-gray-950 px-6 py-3 rounded-xl text-sm font-bold tracking-wide transition shadow-lg"
            >
                Send
            </button>
        </form>
    </footer>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const badge = document.getElementById('connection-badge');

        // Create a distinct username for this session
        const username = "User_" + Math.floor(Math.random() * 9000 + 1000);

        // Connect to a free managed real-time WebSocket cluster channel
        // (Uses a public demo key for instant testing)
        const pieSocket = new PieSocket.default({
            clusterId: "demo",
            apiKey: "oCdGGAwzG3o43wZO51sSyJtCSTWhGxx2xdtcNFSp" 
        });

        let channel;

        pieSocket.subscribe("global-chitchat-room").then(ch => {
            channel = ch;
            
            // Update UI status once connected to web sockets pipeline
            badge.innerText = "Live Connected";
            badge.className = "text-xs bg-emerald-950 text-emerald-400 px-3 py-1 rounded-full font-semibold border border-emerald-800";

            // Listen for incoming live chat broadcasts from anyone around the world
            channel.listen("new_message", (data) => {
                renderMessage(data.user, data.text, data.user === username);
            });
        });

        // Trigger action when user submits the message form
        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if(!text || !channel) return;

            // Broadcast message package to everyone inside the channel room
            channel.publish("new_message", {
                user: username,
                text: text
            });

            messageInput.value = ''; // Clean input field box
        });

        function renderMessage(sender, messageText, isMe) {
            const wrapper = document.createElement('div');
            wrapper.className = isMe ? "flex justify-end" : "flex justify-start";

            const msgBubble = document.createElement('div');
            msgBubble.className = isMe 
                ? "bg-emerald-500 text-gray-950 p-3 rounded-xl rounded-tr-none text-sm font-medium max-w-sm shadow-md"
                : "bg-gray-800 text-gray-100 p-3 rounded-xl rounded-tl-none text-sm max-w-sm border border-gray-700 shadow-md";

            msgBubble.innerHTML = `
                <p class="text-[10px] uppercase tracking-wider font-bold mb-1 opacity-60">${sender}</p>
                <p class="break-words">${messageText}</p>
            `;

            wrapper.appendChild(msgBubble);
            chatWindow.appendChild(wrapper);
            
            // Auto scroll down directly to the newest message
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
